name: Documentation

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build documentation
        run: |
          RUSTDOCFLAGS="--html-in-header docs/docs-header.html" cargo doc --no-deps --all-features

      - name: Prepare deployment
        run: |
          # Determine version
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="latest"
          fi
          
          # Store the newly built docs temporarily
          mkdir -p /tmp/new_doc
          cp -r target/doc/* /tmp/new_doc/
          
          # Configure Git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Fetch and checkout gh-pages branch
          git fetch origin gh-pages || true
          if git ls-remote --exit-code --heads origin gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi
          
          # Copy new docs to versioned directory
          mkdir -p $VERSION
          rm -rf $VERSION/*
          cp -r /tmp/new_doc/* $VERSION/
          
          # Create root redirect to latest
          cat <<EOF > index.html
          <!DOCTYPE html>
          <html>
            <head>
              <meta http-equiv="refresh" content="0; url=latest/pinner/index.html">
            </head>
            <body>
              <p>Redirecting to <a href="latest/pinner/index.html">latest documentation</a>...</p>
            </body>
          </html>
          EOF
          
          # Update versions.json
          # Get all directories that match latest or v*
          VERSIONS=$(ls -d latest v* 2>/dev/null | sort -V -r | jq -R . | jq -s .)
          # Ensure 'latest' is first
          if echo "$VERSIONS" | jq -e '. | contains(["latest"])' > /dev/null; then
             VERSIONS=$(echo "$VERSIONS" | jq '["latest"] + (. - ["latest"])')
          fi
          echo "$VERSIONS" > versions.json
          
          # Commit and push back to gh-pages branch
          git add .
          git commit -m "Deploy documentation for $VERSION" || true
          git push origin gh-pages
          
          # Prepare artifact for upload (exclude .git)
          mkdir -p /tmp/deploy
          rsync -a --exclude='.git' . /tmp/deploy/

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: '/tmp/deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
